name: CI

name: CI

      - name: Install dependencies
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

        run: npm install
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install
    - run: npm run build

      - name: Run tests
        run: npm test
