name: CI

# Trigger on push and pull request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up Node.js 25 (matches the version used in the Dockerfile)
      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Generate Prisma client from schema (does not need a real DB connection)
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Build the project
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OLLAMA_MODEL: llama3.2

      # Lint the project
      - name: Lint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: build # Only deploy if the build job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Only deploy on push to main, not on pull requests

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # SSH into the EC2 instance, pull latest code, and restart Docker Compose
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}         # Your EC2 public IP or DNS
          username: ${{ secrets.EC2_USER }}     #untu or ec2-user
          key: ${{ secrets.EC2_KEY }}           # Contents of your .pem private key
          script: |
            # 1. Install prerequisites
            # 1. Install prerequisites
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl gnupg lsb-release

            # 2. Install Docker (official script)
            curl -fsSL https://get.docker.com | sudo bash

            # 3. Install Docker Compose plugin
            sudo apt-get install -y docker-compose-plugin

            # 4. Add user to docker group
            sudo usermod -aG docker $USER

            # 5. Clone repo if missing, else pull latest
            if [ ! -d "~/app/.git" ]; then
              git clone https://github.com/${{ github.repository }} ~/app
            fi
            cd ~/app
            git pull origin main

            # 6. Ensure .env exists and has OLLAMA_MODEL
            if ! grep -q OLLAMA_MODEL .env; then
              echo 'OLLAMA_MODEL=llama3.2' >> .env
            fi

            # 7. Start/restart containers with sudo
            sudo docker compose down || true
            sudo docker compose up -d --build
