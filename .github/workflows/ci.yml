name: CI

# Trigger on push and pull request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up Node.js 25 (matches the version used in the Dockerfile)
      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Generate Prisma client from schema (does not need a real DB connection)
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Build the project
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Lint the project
      - name: Lint
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    needs: build # Only deploy if the build job passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Only deploy on push to main, not on pull requests

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # SSH into the EC2 instance, pull latest code, and restart Docker Compose
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}         # Your EC2 public IP or DNS
          username: ${{ secrets.EC2_USERNAME }} # e.g. ubuntu or ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}       # Contents of your .pem private key
          script: |
            cd ~/app                              # Folder where your project lives on EC2
            git pull origin main                  # Pull latest code
            docker compose down                   # Stop running containers
            docker compose up -d --build          # Rebuild images and start containers
